server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Keep only bot containers (dev: *-rust-dev-N, prod: *-rust-app-N).
      - source_labels: ['__meta_docker_container_name']
        regex: '/.+-rust-(dev|app)-\d+$'
        action: keep

      # container = full docker name (e.g. tg-git-logger-rust-dev-1) — without leading "/"
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'

      # service = "giteye-bot" — friendly alias, easier to query in Grafana.
      - target_label: 'service'
        replacement: 'giteye-bot'

      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'

    pipeline_stages:
      # Parse JSON logs (when LOG_FORMAT=json). For text logs this is a no-op.
      - json:
          expressions:
            level: level
            target: target
            message: fields.message
      - labels:
          level:
          target:
